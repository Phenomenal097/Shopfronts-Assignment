name: Playwright Java Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 1: Build the project pointing to the framework folder
    - name: Build Project
      run: mvn -B compile test-compile --file framework/pom.xml

    # Step 2: Install Playwright system browsers using the correct pom.xml location
    - name: Ensure Playwright Browsers are Installed
      run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps" --file framework/pom.xml

    # Step 3: Run your Playwright Test Suite inside the framework folder
    - name: Run Playwright Tests
      run: mvn test --file framework/pom.xml

    # Step 4: Save your Test Reports (updated path to look inside framework folder)
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-reports
        path: framework/target/surefire-reports/
        retention-days: 30

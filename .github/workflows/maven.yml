name: Playwright Java Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 1: Build the project dependencies first without running tests
    - name: Build Project
      run: mvn -B compile test-compile

    # Step 2: Install Playwright system browsers and dependencies on the runner
    - name: Ensure Playwright Browsers are Installed
      run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"

    # Step 3: Run your Playwright Test Suite
    - name: Run Playwright Tests
      run: mvn test

    # Step 4: Save your Test Reports/Screenshots even if the tests fail
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-reports
        path: target/surefire-reports/
        retention-days: 30
